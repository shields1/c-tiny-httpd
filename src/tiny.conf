server {
    listen 80;
    listen [::]:80;

    server_name tiny.shields.nu;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://tiny.shields.nu$request_uri;
    }
}


server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name tiny.shields.nu;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tiny.shields.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiny.shields.nu/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3490;
    }
}